aid: pendle-finance
url: https://raw.githubusercontent.com/api-evangelist/pendle-finance/refs/heads/main/apis.yml
name: Pendle Finance
kind: opensource
description: Pendle Finance is a decentralized yield-trading protocol that tokenizes
  future yield by stripping yield-bearing assets into Principal Tokens (PT) and Yield
  Tokens (YT) wrapped in a Standardized Yield (SY) layer. PT trades at a discount
  and matures one-to-one for the underlying at expiry, giving buyers a fixed yield;
  YT entitles holders to the variable yield until expiry, letting them long, hedge,
  or speculate on yield itself. Pendle V2 pairs this with a purpose-built AMM for
  trading time-decaying assets, and Boros extends the design into a margin venue for
  trading yield as a perpetual rate. The protocol is live on Ethereum, Arbitrum, BNB
  Chain, Optimism, Base, Mantle, Sonic, Berachain, HyperEVM, Monad, Katana, and Ink.
  Developer surface includes the Pendle Hosted SDK (a REST API for generating Pendle
  transactions), a Backend Data API for market, asset, price, and governance data,
  Socket.IO real-time feeds, the Boros TypeScript SDK and Boros HTTP API, vePENDLE
  / sPENDLE governance, and audited open-source Solidity contracts for V2 cores, SY
  wrappers, and Boros core.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- DeFi
