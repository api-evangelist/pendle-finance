apis:
- aid: pendle-finance:pendle-hosted-sdk
  name: Pendle Hosted SDK API
  description: A hosted REST API that generates ready-to-broadcast calldata for every
    Pendle protocol action — swap (including tokens-to-PT, PT-to-tokens, YT swaps),
    add and remove liquidity, ZPI (zero-price-impact) flows, mint and redeem PT/YT,
    mint and redeem SY, transfer liquidity, roll over PT positions, and dual-sided
    liquidity. Most operations go through a single universal Convert endpoint (`POST
    /v3/sdk/{chainId}/convert`) that accepts tokens in, tokens out, amounts, receiver,
    slippage, optional aggregator selection (KyberSwap, etc.), and additional analytics
    flags (impliedApy, effectiveApy). The hosted SDK tracks Pendle UI behaviour exactly
    and is updated whenever underlying SY assets evolve, so integrators do not have
    to patch client SDKs to follow protocol changes.
  humanURL: https://docs.pendle.finance/pendle-dev/Backend/HostedSdk
  baseURL: https://api-v2.pendle.finance/core
  tags:
  - SDK
  - Hosted API
  - Transactions
  - Swap
  - Liquidity
  - Mint
  - Redeem
  properties:
  - type: Documentation
    url: https://docs.pendle.finance/pendle-dev/Backend/HostedSdk
  - type: APIReference
    url: https://api-v2.pendle.finance/core/docs
  - type: Examples
    url: https://github.com/pendle-finance/pendle-examples-public/tree/main/hosted-sdk-demo
  - url: graphql/pendle-finance-graphql.md
    type: GraphQL
- aid: pendle-finance:pendle-backend-data-api
  name: Pendle Backend Data API
  description: REST API for offchain Pendle data — markets, assets, prices, user positions,
    transactions, points, and governance. Cross-chain endpoints (`GET /v2/markets/all`,
    `GET /v1/assets/all`, `GET /v1/prices/assets`) return data spanning every supported
    chain in one call and are the recommended entry points for new integrations. Chain-scoped
    endpoints (`/v3/{chainId}/markets/{address}/historical-data`, `/v5/{chainId}/transactions/{address}`)
    provide deep market history with optional APY breakdown and per-address transaction
    history. The pricing response includes a partial-success `errors` array so callers
    can handle non-fatal missing-asset cases without retrying.
  humanURL: https://docs.pendle.finance/pendle-dev/Backend/ApiOverview
  baseURL: https://api-v2.pendle.finance/core
  tags:
  - Backend API
  - Markets
  - Assets
  - Prices
  - Governance
  - Analytics
  properties:
  - type: Documentation
    url: https://docs.pendle.finance/pendle-dev/Backend/ApiOverview
  - type: APIReference
    url: https://api-v2.pendle.finance/core/docs
- aid: pendle-finance:pendle-realtime-feeds
  name: Pendle Real-Time Feeds (Socket.IO)
  description: Real-time data feeds delivered over Socket.IO from `https://api-v2.pendle.finance/pendle-v2`.
    Clients connect once over WebSocket and subscribe to per-feed room ids to receive
    order-book snapshots and other push updates without polling. The limit-order order-book
    feed pushes a fresh snapshot every five seconds for every whitelisted market at
    four precision levels and mirrors the payload shape of the REST endpoint `GET
    /limit-order/v2/order-book/:chainId`.
  humanURL: https://docs.pendle.finance/pendle-dev/Backend/SocketIO
  baseURL: https://api-v2.pendle.finance
  tags:
  - Real-Time
  - WebSocket
  - Socket.IO
  - Order Book
  - Streaming
  properties:
  - type: Documentation
    url: https://docs.pendle.finance/pendle-dev/Backend/SocketIO
- aid: pendle-finance:pendle-router-static
  name: Pendle Router Static (On-chain Helper)
  description: RouterStatic is an on-chain read-only helper contract that exposes
    simulation and quoting functions used by the Pendle SDK and frontend — previewing
    swap, mint, redeem, and liquidity outcomes without submitting a transaction. Integrators
    can call RouterStatic directly from any web3 client to drive custom quoting, analytics,
    or trade simulation flows.
  humanURL: https://docs.pendle.finance/pendle-dev/Backend/RouterStatic
  baseURL: https://docs.pendle.finance/pendle-dev/Backend/RouterStatic
  tags:
  - Smart Contracts
  - Read-Only
  - Quotes
  - Simulation
  properties:
  - type: Documentation
    url: https://docs.pendle.finance/pendle-dev/Backend/RouterStatic
- aid: pendle-finance:boros-http-api
  name: Pendle Boros HTTP API
  description: REST API for the Boros margin trading venue — querying markets, account
    positions, orders, fills, funding, and historical data, and submitting signed
    orders generated via the Boros SDK. Boros lets traders take leveraged long or
    short positions on yield rates with a cross-margin or isolated-margin account
    model and an Agent trading pattern that delegates signing to scoped subaccounts.
    The HTTP API is the integration backbone for bots, market-makers, and analytics.
  humanURL: https://docs.pendle.finance/boros-dev/Backend/api
  baseURL: https://docs.pendle.finance/boros-dev/Backend/api
  tags:
  - Boros
  - Margin
  - Trading
  - Yield Perpetuals
  - HTTP API
  properties:
  - type: Documentation
    url: https://docs.pendle.finance/boros-dev/Backend/api
  - type: Overview
    url: https://docs.pendle.finance/boros-dev/Backend/overview
- aid: pendle-finance:boros-sdk
  name: Pendle Boros SDK
  description: Official TypeScript SDK (`@pendle/boros-sdk-public`) that wraps calldata
    generation, EIP-712 signing, the Agent trading model, and Send-Txs-Bot dispatch
    on top of the Boros HTTP API. Uses `viem` 2.x as a peer dependency and pairs with
    `@pendle/boros-offchain-math` for tick/rate conversion. Exposes a high-level `Exchange`
    client with methods like `placeOrder`, `getAllMarkets`, plus an escape-hatch `getOpenApiSdk()`
    for direct OpenAPI access.
  humanURL: https://docs.pendle.finance/boros-dev/Backend/sdk
  baseURL: https://github.com/pendle-finance/boros-sdk-public
  tags:
  - Boros
  - SDK
  - TypeScript
  - Margin
  - Trading
  properties:
  - type: Documentation
    url: https://docs.pendle.finance/boros-dev/Backend/sdk
  - type: Repository
    url: https://github.com/pendle-finance/boros-sdk-public
  - type: Package
    url: https://www.npmjs.com/package/@pendle/boros-sdk-public
  - type: GettingStarted
    url: https://docs.pendle.finance/boros-dev/Backend/bot-quickstart
  - type: Examples
    url: https://github.com/pendle-finance/boros-api-examples
- aid: pendle-finance:pendle-core-v2-contracts
  name: Pendle V2 Core Smart Contracts
  description: Open-source Solidity implementation of the Pendle V2 protocol — Router,
    MarketFactory, Market, PT, YT, vePENDLE, fee distributor, governance, and supporting
    libraries. Distributed on npm as `@pendle/core-v2`, allowing other Solidity projects
    to import the interfaces directly. Deployed to Ethereum (chain 1), Optimism (10),
    BNB Chain (56), Sonic (146), Monad (143), HyperEVM (999), Mantle (5000), Base
    (8453), Arbitrum (42161), Ink (57073), Berachain (80094), and Katana (747474).
    Audited by six independent firms with reports kept in the `audits` folder of the
    public repo.
  humanURL: https://github.com/pendle-finance/pendle-core-v2-public
  baseURL: https://github.com/pendle-finance/pendle-core-v2-public
  tags:
  - Smart Contracts
