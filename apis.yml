- aid: pendle-finance:pendle-sy-contracts
  name: Pendle SY (Standardized Yield) Contracts
  description: Public repository of Standardized Yield (SY) wrapper contracts that
    adapt every supported yield-bearing asset (LSTs, LRTs, stablecoin vaults, RWA
    tokens, etc.) into a single ERC-20 surface that Pendle V2 Markets understand.
    New asset listings ship as new SY contracts in this repo, paired with deployment
    scripts in `Pendle-SY-Public` and tests in `pendle-sy-tests`.
  humanURL: https://github.com/pendle-finance/Pendle-SY-Public
  baseURL: https://github.com/pendle-finance/Pendle-SY-Public
