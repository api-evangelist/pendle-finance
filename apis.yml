- name: Pendle Features
  type: Features
  data:
  - name: Yield Stripping (PT and YT)
    description: Splits any yield-bearing asset into a Principal Token redeemable
      one-to-one at expiry and a Yield Token capturing every unit of yield until expiry,
      letting users trade the two halves independently.
  - name: Standardized Yield (SY) Wrappers
    description: ERC-5115 inspired wrappers normalize hundreds of LSTs, LRTs, stablecoin
      vaults, and RWA tokens into a single token interface that Pendle V2 markets
      and AMM understand.
  - name: Fixed Yield Trading
    description: Buying PT at a discount locks in a fixed APY through expiry, regardless
      of how the underlying floating yield evolves.
  - name: Leveraged Yield Exposure (YT)
    description: Buying YT gives capital-efficient long exposure to floating yield
      without holding the principal, used to long, hedge, or speculate on yield rates.
  - name: Time-Decay AMM
    description: Purpose-built AMM that prices PT and YT against the underlying while
      accounting for time-to-expiry, supporting deep liquidity for yield trading.
  - name: vePENDLE Governance and Boosts
    description: Locking PENDLE into vePENDLE grants governance power, voting on gauge
      weights, fee share, and LP yield boosts across markets.
  - name: Boros — Yield as a Perpetual
    description: Margin trading venue that turns variable yield rates into perpetual
      instruments with leverage, cross-margin, isolated margin, and an Agent trading
      model.
  - name: Multi-Chain Deployment
    description: Live on Ethereum, Arbitrum, BNB Chain, Optimism, Base, Mantle, Sonic,
      Berachain, HyperEVM, Monad, Katana, and Ink — markets and PT/YT pairs deployed
      per chain.
  - name: Hosted SDK for Drop-In Integration
    description: A single Convert endpoint generates calldata for every protocol action
      so integrators never have to patch a client SDK as underlying SY assets evolve.
  - name: Cross-Chain Backend Data
    description: '`/v2/markets/all`, `/v1/assets/all`, and `/v1/prices/assets` return
      data across every supported chain in a single request, with pagination, points
      data, and partial-success error reporting.'
  - name: Real-Time Order-Book Feeds
    description: Socket.IO order-book streams push snapshots every five seconds for
      every whitelisted market at four precision levels.
- name: Pendle Use Cases
  type: UseCases
  data:
  - name: Fixed-Yield Vault
    description: Wrap PT purchases into a vault product that delivers a fixed APY
      on stablecoins or ETH-denominated LSTs until expiry.
  - name: Yield Speculation Desk
    description: Use YT to take leveraged directional positions on a specific asset's
      yield without holding the principal collateral.
  - name: Points / Airdrop Maximization
    description: Stack ecosystem points (eigenlayer, ethena, etc.) by holding YT of
      point-bearing assets, with `/v2/markets/all` exposing per-market points metadata.
  - name: LP Strategy Optimizer
    description: Auto-rebalance liquidity across Pendle pools using the Hosted SDK
      Convert API for add/remove/transfer-liquidity and the Backend Data API for APY
      breakdown.
  - name: Boros Yield Trading Bot
    description: Quote-driven market-making or directional bot on Boros markets using
      the Boros SDK, Send-Txs Bot, and Socket.IO order-book feed.
  - name: DeFi Portfolio Analytics
    description: Build dashboards over Pendle positions using historical APY breakdown,
      transaction history, and price endpoints.
  - name: Cross-Chain Yield Aggregation
    description: Aggregate Pendle markets across 12+ EVM chains via the cross-chain
      REST endpoints for unified yield discovery and routing.
- name: Pendle Integrations
  type: Integrations
  data:
  - name: Ethereum
    description: Mainnet deployment (chain id 1) — flagship Pendle markets and vePENDLE
      governance.
  - name: Arbitrum
    description: Arbitrum One (42161) — heavy LRT and stablecoin yield activity.
  - name: BNB Chain
    description: BNB Chain (56) — Pendle markets for BNB-ecosystem yield assets.
  - name: Optimism
    description: Optimism (10) — Pendle markets for OP-stack yield assets.
  - name: Base
